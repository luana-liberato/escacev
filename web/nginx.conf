# nginx de produção: serve o build estático do front e faz o proxy reverso da
# API no mesmo domínio. Front e API na MESMA origem — por isso não há CORS a
# configurar, e o bundle usa `/api` relativo (sem o domínio embutido).

# --- HTTP: só desafio do certbot e redirecionamento para HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name escacev.com www.escacev.com;

    # Precisa continuar em HTTP: é assim que o Let's Encrypt valida o domínio,
    # inclusive nas renovações. Não redirecionar este caminho.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://escacev.com$request_uri;
    }
}

# --- HTTPS no www: manda para o domínio sem www (uma origem canônica) ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.escacev.com;

    ssl_certificate     /etc/letsencrypt/live/escacev.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/escacev.com/privkey.pem;

    return 301 https://escacev.com$request_uri;
}

# --- HTTPS: a aplicação ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name escacev.com;

    ssl_certificate     /etc/letsencrypt/live/escacev.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/escacev.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    gzip            on;
    gzip_types      text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # --- API ---
    # A barra final no proxy_pass REMOVE o prefixo /api: uma requisição a
    # /api/escalas chega na API como /escalas. É o que mantém as rotas do
    # back inalteradas (elas vivem na raiz).
    location /api/ {
        proxy_pass http://api:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # A API está atrás do TLS do nginx; sem isto ela se veria como HTTP.
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- front ---
    root  /usr/share/nginx/html;
    index index.html;

    # Hash no nome do arquivo: pode cachear forte.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA: as rotas do React Router (/agenda, /escalas/:id, /auth/callback…) não
    # existem como arquivo. Sem este fallback, recarregar a página dá 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
