# nginx INTERNO do projeto: serve o build estático do front e faz o proxy da API
# no mesmo domínio. Front e API na MESMA origem — por isso não há CORS a
# configurar, e o bundle usa `/api` relativo (sem o domínio embutido).
#
# Só HTTP, e escutando em 127.0.0.1 pelo compose: quem fala com a internet é o
# nginx DO HOST, que termina o TLS e repassa para cá (mesmo padrão dos outros
# projetos da VPS — ver deploy/nginx-host.conf e docs/deploy.md). Certificado,
# HSTS e redirecionamento de HTTP/www são responsabilidade do host, não daqui:
# duplicá-los aqui só criaria duas fontes de verdade.

server {
    listen 80;
    # O host já resolveu qual domínio é: aqui aceita qualquer nome.
    server_name _;

    gzip            on;
    gzip_types      text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # --- API ---
    # A barra final no proxy_pass REMOVE o prefixo /api: uma requisição a
    # /api/escalas chega na API como /escalas. É o que mantém as rotas do
    # back inalteradas (elas vivem na raiz).
    location /api/ {
        proxy_pass http://api:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Repassa o protocolo ORIGINAL, vindo do nginx do host. Usar $scheme
        # aqui diria "http", porque este salto é interno — a informação de que o
        # usuário veio por HTTPS se perderia no meio do caminho.
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # --- front ---
    root  /usr/share/nginx/html;
    index index.html;

    # Hash no nome do arquivo: pode cachear forte.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA: as rotas do React Router (/agenda, /escalas/:id, /auth/callback…) não
    # existem como arquivo. Sem este fallback, recarregar a página dá 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
