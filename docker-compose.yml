# Ambiente de DESENVOLVIMENTO. Produção fica no docker-compose.prod.yml.
services:
  postgres:
    image: postgres:16-alpine
    container_name: escacev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: escacev
      POSTGRES_PASSWORD: escacev
      POSTGRES_DB: escacev
    ports:
      - '5432:5432'
    volumes:
      - escacev-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U escacev -d escacev']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    container_name: escacev-api
    build:
      context: ./api
      dockerfile: Dockerfile
      # Os Dockerfiles são multi-stage: sem `target`, o build pegaria o último
      # estágio (produção) e o modo de desenvolvimento sumiria.
      target: development
    restart: unless-stopped
    # Segredos e credenciais do dia a dia (JWT_SECRET, GOOGLE_*, SMTP_*,
    # FRONTEND_URL) saem do api/.env — o mesmo arquivo usado ao rodar fora do
    # Docker. Sem isto o container subia sem JWT_SECRET e quebrava no login.
    env_file:
      - ./api/.env
    environment:
      # Sobrescreve o que é específico do container: dentro da rede do compose o
      # banco é `postgres`, não `localhost` (o `environment` vence o `env_file`).
      DATABASE_URL: postgresql://escacev:escacev@postgres:5432/escacev
      PORT: '3001'
      NODE_ENV: development
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    # Aplica as migrations já versionadas antes de subir a API.
    command: sh -c "npx prisma migrate deploy && npm run dev"

  web:
    container_name: escacev-web
    build:
      context: ./web
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    environment:
      # O browser roda no host, então aponta para a porta exposta da API.
      VITE_API_URL: http://localhost:3001
    ports:
      - '5173:5173'
    depends_on:
      - api

volumes:
  escacev-pgdata:
