# Configuração do nginx DO HOST (não vai para dentro de container).
# Instalar como /etc/nginx/sites-available/escacev e ligar em sites-enabled —
# mesmo padrão dos projetos cantinhodajenny, juntosnameta e realnaveia.
#
# Este arquivo é a versão HTTP inicial, de propósito: rode `certbot --nginx`
# depois de instalá-lo e o próprio certbot injeta aqui os blocos de TLS e o
# redirecionamento de HTTP para HTTPS, como já fez nos outros sites. Escrever o
# bloco 443 à mão antes de o certificado existir só faria o nginx recusar a
# recarregar — e derrubaria os outros 3 projetos junto, porque é o mesmo nginx.
#
# O domínio fica atrás do proxy do Cloudflare. O IP real do visitante é
# restaurado em /etc/nginx/conf.d/cloudflare-realip.conf, gerado por
# deploy/cloudflare-realip.sh — não é definido aqui porque as faixas do
# Cloudflare mudam e precisam ser regeradas, não editadas à mão.

server {
    listen 80;
    listen [::]:80;
    server_name escacev.com www.escacev.com;

    # Todo o tráfego vai para o nginx interno do projeto (container `web`), que
    # serve os estáticos e resolve o /api internamente. Um único destino, como
    # no realnaveia.
    location / {
        proxy_pass http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Aqui $scheme é a fonte da verdade: este é o salto que termina o TLS.
        # O nginx interno apenas repassa adiante o que chegar neste cabeçalho.
        proxy_set_header X-Forwarded-Proto $scheme;

        # O fluxo do Google OAuth atravessa este proxy com redirecionamentos;
        # sem isto, respostas 3xx grandes podem estourar o buffer padrão.
        proxy_buffer_size       8k;
        proxy_busy_buffers_size 16k;
        proxy_buffers        4  8k;
    }
}
